{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="{% static  'main/css/app.css' %}">
    <link rel="stylesheet" href="{% static  'main/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<button class="menu-toggle" id="toggle-btn">
    <i class="fa-solid fa-bars"></i>
</button>

<aside class="sidebar" id="sidebar">
    <img src="{% static 'main/img/pamir_south_logo.jpeg' %}" alt="Logo">
    <span class="logo">PAMIR SOUCH</span>
    <h3>НАВИГАЦИЯ</h3>
    <ul>
        <a href="/"><li><i class="fa-solid fa-house"></i>Главная</li></a>
        <a href="/about"><li><i class="fa-solid fa-user"></i>О нас</li></a>
        <a href="/contact"><li><i class="fa-solid fa-phone"></i>Контакты</li></a>
    </ul>


</aside>

<main id="main">
    {% block content %}
    {% endblock %}
</main>
    <script>
        const btn = document.getElementById("toggle-btn");
        const sidebar = document.getElementById("sidebar");
        const main = document.getElementById("main");

        btn.addEventListener("click", () => {
            sidebar.classList.toggle("active");
            main.classList.toggle("active");
        });
    </script>

</body>
</html>
